<main>
<h1>Mitsubishi AC</h1>
<div class="subtitle">Remote control panel</div>
<div class="stats" style="margin-bottom:14px">
<div class="stat"><div class="k">Power</div><div class="v" id="s-power">--</div></div>
<div class="stat"><div class="k">Mode</div><div class="v" id="s-mode">--</div></div>
<div class="stat"><div class="k">Set Temp</div><div class="v" id="s-temp">--</div></div>
<div class="stat"><div class="k">Room Temp</div><div class="v" id="s-room">--</div></div>
<div class="stat"><div class="k">Fan</div><div class="v" id="s-fan">--</div></div>
<div class="stat"><div class="k">WiFi</div><div class="v" id="s-wifi">--</div></div>
<div class="stat"><div class="k">CN105 Transport</div><div class="v" id="s-transport">--</div></div>
<div class="stat"><div class="k">HomeKit</div><div class="v" id="s-hk">--</div></div>
</div>
<div class="card">
<h3>Remote</h3>
<div class="row">
<div><label>Power</label><select id="power"><option>OFF</option><option>ON</option></select></div>
<div><label>Mode</label><select id="mode"><option>COOL</option><option>HEAT</option><option>DRY</option><option>FAN</option><option>AUTO</option></select></div>
</div>
<div class="row3">
<div><label>Temperature °F</label><input id="temp" type="number" min="50" max="88" step="1" value="77"></div>
<div><label>Fan Speed</label><select id="fan"><option>AUTO</option><option>QUIET</option><option>1</option><option>2</option><option>3</option><option>4</option></select></div>
<div><label>Vertical Vane</label><select id="vane"><option>AUTO</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>SWING</option></select></div>
</div>
<div><label>Horizontal Vane</label><select id="wide"><option value="|">Center</option><option value="&lt;&lt;">Far Left</option><option value="&lt;">Left</option><option value="&gt;">Right</option><option value="&gt;&gt;">Far Right</option><option value="&lt;&gt;">Wide</option><option>SWING</option></select></div>
<div class="btns"><button class="btn-send" onclick="send()">Send</button><button class="btn-secondary" onclick="refresh()">Refresh</button></div>
</div>
<pre id="out">Loading...</pre>
</main>
